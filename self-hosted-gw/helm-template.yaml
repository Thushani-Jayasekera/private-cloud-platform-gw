# Source: gateway/templates/gateway/gateway-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-gateway-config
  labels:
    helm.sh/chart: gateway-1.1.1
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: my-gateway
    app.kubernetes.io/version: "1.1.0"
data:
  config.toml: |
    [controller.server]
    api_port = 9090
    xds_port = 18000
    shutdown_timeout = "30s"
    gateway_id = "prod-gateway"

    [controller.policy_server]
    port = 18001

    [controller.policy_server.tls]
    enabled = false
    cert_file = ""
    key_file = ""

    [controller.storage]
    type = "postgres"

    [controller.storage.sqlite]
    path = "./data/gateway.db"
    [controller.storage.postgres]
    host = "gateway-postgres-postgresql.ap-gateway.svc.cluster.local"
    port = 5432
    database = "gateway_controller"
    user = "gateway"
    sslmode = "disable"
    connect_timeout = "5s"
    max_open_conns = 10
    max_idle_conns = 5
    conn_max_lifetime = "30m"
    conn_max_idle_time = "5m"
    application_name = "gateway-controller"

    [controller.policies]
    definitions_path = ""

    [controller.controlplane]
    insecure_skip_verify = true
    reconnect_initial = "1s"
    reconnect_max = "5m"
    polling_interval = "15m"
    deployment_push_enabled = false
    sync_batch_size = 50
    gateway_name = "prod-gateway"
    apim_oauth2_client_id = ""
    apim_oauth2_client_secret = ""
    apim_oauth2_username = ""
    apim_oauth2_password = ""
    [[controller.encryption.providers]]
    type = "aesgcm"
    [[controller.encryption.providers.keys]]
    version = "aesgcm256-v1"
    file = "/app/data/aesgcm-keys/default-aesgcm256-v1.bin"

    [router]
    gateway_host = "*"
    listener_port = 8080
    https_enabled = true
    https_port = 8443
    tracing_service_name = "router"

    [router.access_logs]
    enabled = true
    format = "json"
    json_fields = {bytesRx = "%BYTES_RECEIVED%", bytesTx = "%BYTES_SENT%", connTrmDtl = "%CONNECTION_TERMINATION_DETAILS%", dur = "%DURATION%", host = "%REQ(:AUTHORITY)%", meth = "%REQ(:METHOD)%", path = "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%", proto = "%PROTOCOL%", reqId = "%REQ(X-REQUEST-ID)%", respCd = "%RESPONSE_CODE%", respCdDtl = "%RESPONSE_CODE_DETAILS%", respFlg = "%RESPONSE_FLAGS%", t = "%START_TIME%", uHost = "%UPSTREAM_HOST%", uPath = "%REQ(:PATH)%", uProto = "%UPSTREAM_PROTOCOL%", uSvcT = "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%", ua = "%REQ(USER-AGENT)%", xff = "%REQ(X-FORWARDED-FOR)%" }

    [router.downstream_tls]
    cert_path = "./listener-certs/default-listener.crt"
    key_path = "./listener-certs/default-listener.key"
    minimum_protocol_version = "TLS1_2"
    maximum_protocol_version = "TLS1_3"
    ciphers = "ECDHE-ECDSA-AES128-GCM-SHA256,ECDHE-RSA-AES128-GCM-SHA256,ECDHE-ECDSA-AES128-SHA,ECDHE-RSA-AES128-SHA,AES128-GCM-SHA256,AES128-SHA,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-RSA-AES256-GCM-SHA384,ECDHE-ECDSA-AES256-SHA,ECDHE-RSA-AES256-SHA,AES256-GCM-SHA384,AES256-SHA"

    [router.upstream.tls]
    minimum_protocol_version = "TLS1_2"
    maximum_protocol_version = "TLS1_3"
    ciphers = "ECDHE-ECDSA-AES128-GCM-SHA256,ECDHE-RSA-AES128-GCM-SHA256,ECDHE-ECDSA-AES128-SHA,ECDHE-RSA-AES128-SHA,AES128-GCM-SHA256,AES128-SHA,ECDHE-ECDSA-AES256-GCM-SHA384,ECDHE-RSA-AES256-GCM-SHA384,ECDHE-ECDSA-AES256-SHA,ECDHE-RSA-AES256-SHA,AES256-GCM-SHA384,AES256-SHA"
    trusted_cert_path = "/etc/ssl/certs/ca-certificates.crt"
    custom_certs_path = ""
    verify_host_name = true
    disable_ssl_verification = false

    [router.upstream.timeouts]
    route_timeout_ms = 60000
    route_idle_timeout_ms = 300000
    connect_timeout_ms = 5000

    [router.policy_engine]
    mode = "uds"
    host = ""
    port = 9001
    timeout_ms = 60000
    failure_mode_allow = false
    route_cache_action = "RETAIN"
    allow_mode_override = false
    message_timeout_ms = 60000
    [router.policy_engine.tls]
    enabled = false
    [controller.auth.basic]
    enabled = true
    [[controller.auth.basic.users]]
    username = "admin"
    password = "$2y$05$2UVXrRIRQf1YgCL6KlK.5ebOnBQLMhEwZVphA/BPgoyo37ZdgF1qO"
    password_hashed = true
    roles = ["admin"]
    [[controller.auth.basic.users]]
    username = "user1"
    password = "$2y$05$gqED2lmV1rMQQEAolOgLZOQXdSudgucLaI53XCp1XERNNhm29HlOC"
    password_hashed = true
    roles = ["developer", "consumer"]
    [controller.auth.idp]
    enabled = false
    jwks_url = "https://idp.example.com/.well-known/jwks.json"
    issuer = "https://idp.example.com"
    roles_claim = "scope"

    [controller.logging]
    level = "info"
    format = "json"

    [policy_engine.server]
    extproc_port = 9001

    [policy_engine.admin]
    enabled = true
    port = 9002
    allowed_ips = ["*", "127.0.0.1"]

    [policy_engine.config_mode]
    mode = "xds"

    [policy_engine.xds]
    # server_address is set via -xds-server flag (injected by gateway-runtime entrypoint)
    connect_timeout = "10s"
    request_timeout = "5s"
    initial_reconnect_delay = "1s"
    max_reconnect_delay = "60s"

    [policy_engine.xds.tls]
    enabled = false

    [policy_engine.file_config]
    path = ""

    [policy_engine.logging]
    level = "info"
    format = "json"
    [policy_configurations.llm_cost_v1]
    pricing_file = "/etc/policy-engine/llm-pricing/model_prices.json"
    [immutable_gateway]
    enabled = false
    artifacts_dir = "/etc/api-platform-gateway/immutable_gateway/artifacts"

